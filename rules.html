<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rules — Perkmc</title>
<meta name="description" content="Read the Perkmc server rules before you join — general conduct, building, PvP, cheating and economy rules.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌲</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Fredoka:wght@500;600;700&family=Bangers&family=Luckiest+Guy&family=Press+Start+2P&family=Orbitron:wght@600;700;800&family=Russo+One&family=Bebas+Neue&family=Titan+One&family=Bungee&family=Rubik+Mono+One&family=Inter:wght@400;500;600;700&family=Nunito+Sans:wght@400;600;700&family=Work+Sans:wght@400;500;600&family=Mulish:wght@400;500;600&family=Rubik:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="site-header"></div>

<main>
  <section class="page-hero">
    <span class="pill-badge">📖 Please Read Carefully</span>
    <h1>Server Rules</h1>
    <p>Breaking these rules may result in a warning, mute, kick or ban depending on severity. Staff decisions are final. ⚖️</p>
  </section>

  <section style="padding-top: 10px;">
    <div class="container" style="max-width: 820px;">
      <div id="rulesList"></div>

      <div class="card" style="margin-top: 30px; display:flex; gap:16px; align-items:center;">
        <div class="emoji-badge" style="margin:0;">🙋</div>
        <div>
          <h3 style="margin-bottom:4px;">Questions about a rule?</h3>
          <p style="margin:0;">Ask any staff member in-game or open a ticket on our <a href="discord.html" style="color:var(--green-300,var(--green-400)); text-decoration:underline;">Discord</a>. 💬</p>
        </div>
      </div>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="config.js"></script>
<script src="common.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const cfg = perkmcGetConfig();
    const list = document.getElementById("rulesList");
    list.innerHTML = cfg.rules.map((group, i) => `
      <details class="rule-group" ${i === 0 ? "open" : ""}>
        <summary>${group.emoji} ${group.category}</summary>
        <ul>${group.items.map(item => `<li>${item}</li>`).join("")}</ul>
      </details>
    `).join("");
  });
</script>
</body>
</html>
