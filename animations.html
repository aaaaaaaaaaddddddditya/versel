<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Animations — Velox Lite AI Assistant</title>
<meta name="description" content="Describe any idea and Velox Lite AI creates a live animation — free, downloadable.">
<link rel="icon" type="image/svg+xml" href="logo.svg">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<style>.logo img{width:100%;height:100%;border-radius:inherit;object-fit:cover;display:block}</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000;--violet:#8b5cf6;--purple:#a855f7;--neon:#c084fc;--deep:#6d28d9;
    --text:#ececf1;--text-dim:#9ca3af;
    --glass:rgba(255,255,255,.04);--glass-border:rgba(168,85,247,.22);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--bg);color:var(--text);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    -webkit-font-smoothing:antialiased;overflow:hidden;
  }
  button{font-family:inherit;}

  .bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
  .orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:.26;animation:drift 18s ease-in-out infinite alternate;}
  .orb.a{width:520px;height:520px;background:radial-gradient(circle,#7c3aed,transparent 70%);top:-160px;left:-120px;}
  .orb.b{width:460px;height:460px;background:radial-gradient(circle,#a855f7,transparent 70%);bottom:-140px;right:-100px;animation-delay:-6s;animation-duration:22s;}
  @keyframes drift{0%{transform:translate(0,0) scale(1);}50%{transform:translate(60px,-40px) scale(1.12);}100%{transform:translate(-50px,50px) scale(.95);}}
  .grid-overlay{
    position:absolute;inset:0;
    background-image:linear-gradient(rgba(139,92,246,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(139,92,246,.05) 1px,transparent 1px);
    background-size:56px 56px;
    mask-image:radial-gradient(ellipse at center,black 30%,transparent 75%);
    -webkit-mask-image:radial-gradient(ellipse at center,black 30%,transparent 75%);
  }
  @keyframes appIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}

  .app{
    position:relative;z-index:1;height:100dvh;
    display:flex;flex-direction:column;gap:12px;
    max-width:1160px;margin:0 auto;padding:14px;
    animation:appIn .8s cubic-bezier(.22,1,.36,1) both;
  }

  header{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:12px 18px;
    background:var(--glass);border:1px solid var(--glass-border);border-radius:18px;
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    box-shadow:0 0 40px rgba(139,92,246,.08);
  }
  .brand{display:flex;align-items:center;gap:11px;}
  .logo{
    width:38px;height:38px;border-radius:12px;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--deep),var(--purple));
    box-shadow:0 0 18px rgba(168,85,247,.55);
    animation:logoPulse 3.2s ease-in-out infinite;
  }
  @keyframes logoPulse{0%,100%{box-shadow:0 0 18px rgba(168,85,247,.55);}50%{box-shadow:0 0 28px rgba(192,132,252,.85);}}
  .grad{
    font-weight:800;letter-spacing:-.02em;
    background:linear-gradient(90deg,#e9d5ff,var(--neon),var(--purple),#e9d5ff);
    background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    animation:shine 5s linear infinite;
  }
  @keyframes shine{to{background-position:200% center;}}
  .brand h1{font-size:1.1rem;}
  .back-btn{
    display:flex;align-items:center;gap:8px;
    padding:9px 16px;border-radius:12px;cursor:pointer;text-decoration:none;
    background:rgba(255,255,255,.05);border:1px solid rgba(168,85,247,.3);
    color:var(--text-dim);font-size:.8rem;font-weight:600;transition:all .25s ease;
  }
  .back-btn:hover{color:#fff;border-color:var(--neon);box-shadow:0 0 16px rgba(168,85,247,.4);transform:translateY(-1px);}

  .main{flex:1;min-height:0;display:flex;gap:12px;}

  /* player */
  .stage{
    flex:1;min-width:0;display:flex;flex-direction:column;
    background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.02));
    border:1px solid var(--glass-border);border-radius:22px;
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    box-shadow:0 0 60px rgba(139,92,246,.1),0 24px 60px rgba(0,0,0,.6);
    overflow:hidden;
  }
  .stage-head{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:10px 16px;border-bottom:1px solid rgba(168,85,247,.16);
    background:rgba(168,85,247,.06);
  }
  .stage-head .t{font-size:.8rem;font-weight:700;color:var(--neon);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .acts{display:flex;gap:6px;flex-wrap:wrap;}
  .cbtn{
    display:flex;align-items:center;gap:5px;
    font-size:.7rem;font-weight:600;color:var(--text-dim);
    background:rgba(255,255,255,.05);border:1px solid rgba(168,85,247,.25);
    padding:6px 12px;border-radius:9px;cursor:pointer;transition:all .2s ease;
  }
  .cbtn:hover{color:#fff;border-color:var(--neon);box-shadow:0 0 12px rgba(168,85,247,.35);}
  .stage-body{flex:1;min-height:0;position:relative;background:#0a0614;}
  .stage-body iframe{width:100%;height:100%;border:none;display:block;background:#0a0614;}
  .empty-stage{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    color:var(--text-dim);text-align:center;padding:20px;
  }
  .empty-stage .big{font-size:2.6rem;animation:float 4s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
  .empty-stage p{font-size:.85rem;max-width:380px;line-height:1.6;}

  .loading-stage{
    position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;
    background:rgba(5,3,10,.85);backdrop-filter:blur(6px);z-index:5;
  }
  .loading-stage.show{display:flex;}
  .spinner{
    width:52px;height:52px;border-radius:50%;
    border:3px solid rgba(168,85,247,.2);border-top-color:var(--neon);
    animation:spin 1s linear infinite;
    box-shadow:0 0 24px rgba(168,85,247,.3);
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-stage .lt{font-size:.82rem;color:var(--neon);font-weight:600;animation:blink 1.6s ease-in-out infinite;}

  /* gallery */
  .gallery{
    width:250px;flex-shrink:0;display:flex;flex-direction:column;
    background:rgba(10,6,18,.72);
    border:1px solid rgba(168,85,247,.16);border-radius:22px;
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    overflow:hidden;
  }
  .gal-head{padding:13px 15px 9px;font-size:.66rem;font-weight:800;color:#6b7280;letter-spacing:.12em;text-transform:uppercase;}
  .gal-list{flex:1;overflow-y:auto;padding:0 9px 10px;display:flex;flex-direction:column;gap:6px;}
  .gal-list::-webkit-scrollbar{width:5px;}
  .gal-list::-webkit-scrollbar-thumb{background:linear-gradient(var(--deep),var(--purple));border-radius:99px;}
  .gal-item{
    display:flex;align-items:center;gap:8px;
    padding:10px 11px;border-radius:11px;cursor:pointer;
    font-size:.78rem;color:var(--text-dim);
    border:1px solid transparent;
    transition:all .2s ease;animation:appIn .3s ease both;
  }
  .gal-item:hover{background:rgba(168,85,247,.1);color:#fff;}
  .gal-item.active{background:rgba(168,85,247,.16);color:#fff;border-color:rgba(168,85,247,.3);}
  .gal-item .gt{flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
  .gal-item .gx{
    background:none;border:none;color:#6b7280;cursor:pointer;font-size:.75rem;
    width:20px;height:20px;border-radius:6px;display:none;place-items:center;
  }
  .gal-item:hover .gx{display:grid;}
  .gal-item .gx:hover{color:#fca5a5;background:rgba(248,113,113,.12);}
  .gal-empty{padding:10px 12px;font-size:.72rem;color:#4b5563;line-height:1.5;}

  /* input */
  .input-bar{
    display:flex;flex-direction:column;gap:8px;
    padding:12px 14px;
    background:var(--glass);border:1px solid var(--glass-border);border-radius:18px;
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  }
  .chips{display:flex;gap:7px;flex-wrap:wrap;}
  .chip{
    font-size:.72rem;font-weight:500;color:var(--text-dim);
    background:rgba(255,255,255,.04);border:1px solid rgba(168,85,247,.2);
    padding:6px 13px;border-radius:999px;cursor:pointer;transition:all .25s ease;
  }
  .chip:hover{color:#fff;border-color:var(--neon);background:rgba(168,85,247,.14);box-shadow:0 0 16px rgba(168,85,247,.35);transform:translateY(-2px);}
  .input-inner{
    display:flex;gap:10px;align-items:center;
    background:rgba(255,255,255,.045);border:1px solid rgba(168,85,247,.25);
    border-radius:15px;padding:5px 5px 5px 16px;
    transition:border-color .3s ease,box-shadow .3s ease;
  }
  .input-inner:focus-within{border-color:var(--neon);box-shadow:0 0 0 3px rgba(168,85,247,.14),0 0 30px rgba(168,85,247,.25);}
  #idea{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:inherit;font-size:.92rem;padding:10px 0;min-width:0;}
  #idea::placeholder{color:#6b7280;}
  #gen{
    display:flex;align-items:center;gap:8px;
    padding:11px 22px;border-radius:12px;border:none;cursor:pointer;
    background:linear-gradient(135deg,var(--deep),var(--purple));color:#fff;
    font-size:.86rem;font-weight:700;
    box-shadow:0 0 16px rgba(168,85,247,.4);transition:all .25s ease;flex-shrink:0;
  }
  #gen:hover{transform:translateY(-2px);box-shadow:0 0 26px rgba(192,132,252,.75);}
  #gen:disabled{opacity:.45;cursor:not-allowed;transform:none;}

  /* fullscreen modal */
  .modal-veil{
    position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.8);
    backdrop-filter:blur(6px);display:none;place-items:center;padding:14px;
    animation:appIn .25s ease both;
  }
  .modal-veil.show{display:grid;}
  .fs-box{
    width:min(1100px,97vw);height:min(720px,92vh);
    display:flex;flex-direction:column;
    background:#0c0817;border:1px solid var(--glass-border);border-radius:20px;overflow:hidden;
    box-shadow:0 0 70px rgba(139,92,246,.3);
  }
  .fs-head{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(168,85,247,.1);border-bottom:1px solid rgba(168,85,247,.2);}
  .fs-head .t{font-size:.8rem;font-weight:700;color:var(--neon);}
  .fs-box iframe{flex:1;border:none;width:100%;background:#0a0614;}

  .toast-wrap{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:99;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;}
  .toast{
    padding:10px 18px;border-radius:12px;font-size:.8rem;font-weight:500;color:#fff;
    background:linear-gradient(135deg,rgba(45,30,75,.95),rgba(20,14,36,.95));
    border:1px solid var(--glass-border);box-shadow:0 0 30px rgba(139,92,246,.35);
    animation:appIn .3s ease both;
  }
  .toast.out{transition:all .3s ease;opacity:0;transform:translateY(10px);}

  @media (max-width:820px){
    .gallery{display:none;}
    .brand h1{font-size:.95rem;}
    .acts .cbtn{padding:6px 9px;}
  }
</style>
</head>
<body>

<div class="bg">
  <div class="grid-overlay"></div>
  <div class="orb a"></div>
  <div class="orb b"></div>
</div>

<div class="app">
  <header>
    <div class="brand">
      <div class="logo"><img src="logo.svg" alt="Velox"></div>
      <h1 class="grad">Velox Animations</h1>
    </div>
    <a class="back-btn" href="index.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to chat
    </a>
  </header>

  <div class="main">
    <div class="stage">
      <div class="stage-head">
        <span class="t" id="stageTitle">No animation yet</span>
        <div class="acts">
          <button class="cbtn" id="btnReplay">▶ Replay</button>
          <button class="cbtn" id="btnFull">⛶ Fullscreen</button>
          <button class="cbtn" id="btnDl">⬇ Download</button>
          <button class="cbtn" id="btnCopy">⧉ Copy code</button>
        </div>
      </div>
      <div class="stage-body">
        <iframe id="player" sandbox="allow-scripts"></iframe>
        <div class="empty-stage" id="emptyStage">
          <div class="big">🎬</div>
          <p><b style="color:#fff">Describe any animation idea below</b><br>— stickman dancing, bouncing balls, rain, rocket launch —<br>Velox will create it live, ready to download.</p>
        </div>
        <div class="loading-stage" id="loadingStage">
          <div class="spinner"></div>
          <div class="lt">Velox is animating your idea...</div>
        </div>
      </div>
    </div>

    <div class="gallery">
      <div class="gal-head">My Animations</div>
      <div class="gal-list" id="galList"></div>
    </div>
  </div>

  <div class="input-bar">
    <div class="chips" id="chips">
      <button class="chip">Stickman dancing</button>
      <button class="chip">Bouncing balls with physics</button>
      <button class="chip">Rain on a window</button>
      <button class="chip">Rocket launching to space</button>
      <button class="chip">Fireworks show</button>
    </div>
    <div class="input-inner">
      <input id="idea" type="text" placeholder="Describe your animation idea..." autocomplete="off"/>
      <button id="gen">✨ Generate</button>
    </div>
  </div>
</div>

<div class="modal-veil" id="fsVeil">
  <div class="fs-box">
    <div class="fs-head">
      <span class="t" id="fsTitle">Velox Animation</span>
      <button class="cbtn" id="fsClose">✕ Close</button>
    </div>
    <iframe id="fsFrame" sandbox="allow-scripts"></iframe>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
  const $=id=>document.getElementById(id);
  const store={
    get(k){try{return localStorage.getItem(k);}catch(e){return null;}},
    set(k,v){try{localStorage.setItem(k,v);}catch(e){}}
  };
  const jget=(k,f)=>{const v=store.get(k);if(!v)return f;try{return JSON.parse(v);}catch(e){return f;}};
  const jset=(k,v)=>store.set(k,JSON.stringify(v));
  function toast(msg){
    const t=document.createElement('div');t.className='toast';t.textContent=msg;
    $('toastWrap').appendChild(t);
    setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),350);},2600);
  }
  function copyText(t){
    if(navigator.clipboard&&navigator.clipboard.writeText)return navigator.clipboard.writeText(t);
    const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);
    ta.select();try{document.execCommand('copy');}catch(e){}ta.remove();
    return Promise.resolve();
  }

  /* ---- usage limits (shared with chat app) ---- */
  const SUBS={
    free:{label:"Free",msgs:2000},smart:{label:"Smart",msgs:8000},pro:{label:"Pro",msgs:10000},
    velox:{label:"Velox",msgs:-1},community:{label:"Community",msgs:8000},
    manager:{label:"Manager",msgs:10000},coowner:{label:"Co-Owner",msgs:-1},owner:{label:"Owner",msgs:-1}
  };
  function sessionEmail(){return store.get('vx_session')||null;}
  function mySub(){
    const em=sessionEmail();if(!em)return 'free';
    const users=jget('vx_users',{});const u=users[em];
    return (u&&u.sub&&SUBS[u.sub])?u.sub:'free';
  }
  function usageKey(){return 'vx_usage_'+(sessionEmail()||'guest');}
  function canUse(){
    const lim=SUBS[mySub()].msgs;if(lim<0)return true;
    const today=new Date().toDateString();
    const u=jget(usageKey(),null);
    if(!u||u.d!==today)return true;
    return (u.m||0)<lim;
  }
  function bumpUsage(){
    const today=new Date().toDateString();
    let u=jget(usageKey(),null);
    if(!u||u.d!==today)u={d:today,m:0,i:0};
    u.m++;jset(usageKey(),u);
  }

  /* ---- AI ---- */
  const ANIM_PROMPT="You are Velox Animator, an expert creative coder. The user describes an animation idea. Reply with ONLY one complete self-contained HTML document (inline CSS and JS, no external files) implementing an IMPRESSIVE, COMPLEX animation of that idea. Rules: use <canvas> with requestAnimationFrame for characters/physics; characters (stickman, people, animals) MUST be articulated figures with joints (head, torso, arms with elbows, legs with knees) animated with sine-based motion \u2014 NEVER a static drawing and NEVER just moving text; add background atmosphere (gradient, particles, lights, shadow); smooth infinite loop; canvas fills the window and handles resize; dark background unless asked otherwise. Keep total code under 240 lines. Output the ENTIRE document inside ONE ```html fenced block with ZERO text outside it.";
  async function askProxy(idea){
    const res=await fetch("/api/chat",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        messages:[{role:"system",content:ANIM_PROMPT},{role:"user",content:idea}],
        model:"qwen/qwen3-coder:free",max_tokens:8000
      })
    });
    const data=await res.json().catch(()=>null);
    if(!data)throw new Error("HTTP "+res.status);
    if(!res.ok||data.error)throw new Error(data.error||("HTTP "+res.status));
    if(data.content)return data.content;
    throw new Error("Empty response");
  }
  async function askFallback(idea){
    const res=await fetch("https://text.pollinations.ai/openai",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"openai",messages:[{role:"system",content:ANIM_PROMPT},{role:"user",content:idea}]})
    });
    if(!res.ok)throw new Error("HTTP "+res.status);
    const ct=res.headers.get("content-type")||"";
    if(ct.includes("application/json")){
      const data=await res.json();
      const msg=data.choices&&data.choices[0]&&data.choices[0].message;
      if(msg&&msg.content)return msg.content;
    }
    const t=(await res.text()).trim();
    if(t)return t;
    throw new Error("Empty response");
  }
  function extractCode(reply){
    let m=reply.match(/```(?:html)?\s*\n?([\s\S]*?)```/);
    if(m)return m[1].trim();
    m=reply.match(/```(?:html)?\s*\n?([\s\S]+)$/);
    if(m&&/</.test(m[1])){
      let c=m[1].trim();
      if(!/<\/html>\s*$/i.test(c))c+='\n</body></html>';
      return c;
    }
    if(/^\s*<(!doctype|html|canvas|svg)/i.test(reply))return reply.trim();
    return null;
  }

  /* ---- built-in premium presets (always work) ---- */
  const STICKMAN=`<!DOCTYPE html><html><head><meta charset="utf-8"><style>html,body{margin:0;height:100%;background:#07030f;overflow:hidden}canvas{display:block}</style></head><body><canvas id="c"></canvas><script>
const cv=document.getElementById('c'),g2=cv.getContext('2d');
let W,H;function rs(){W=cv.width=innerWidth;H=cv.height=innerHeight;}rs();addEventListener('resize',rs);
const conf=[];for(let i=0;i<90;i++)conf.push({x:Math.random(),y:Math.random(),s:Math.random()*4+2,v:Math.random()*.6+.3,h:Math.random()*360});
function limb(x1,y1,a1,l1,a2,l2){const mx=x1+Math.cos(a1)*l1,my=y1+Math.sin(a1)*l1;const ex=mx+Math.cos(a1+a2)*l2,ey=my+Math.sin(a1+a2)*l2;g2.beginPath();g2.moveTo(x1,y1);g2.lineTo(mx,my);g2.lineTo(ex,ey);g2.stroke();}
let t=0;
function draw(){
t+=0.035;
const bg=g2.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#0b0518');bg.addColorStop(1,'#170a2e');g2.fillStyle=bg;g2.fillRect(0,0,W,H);
for(let i=0;i<5;i++){const a=t*.7+i*1.256;g2.save();g2.globalAlpha=.08;g2.fillStyle='hsl('+((t*40+i*72)%360)+',90%,60%)';g2.beginPath();g2.moveTo(W/2,0);const bx=W/2+Math.cos(a)*W;g2.lineTo(bx-140,H);g2.lineTo(bx+140,H);g2.closePath();g2.fill();g2.restore();}
conf.forEach(p=>{p.y+=p.v/100;if(p.y>1)p.y=-0.02;g2.fillStyle='hsla('+p.h+',90%,65%,.8)';g2.fillRect(p.x*W,p.y*H,p.s,p.s);});
g2.fillStyle='rgba(160,90,255,.08)';g2.fillRect(0,H*.82,W,H*.18);
const groundY=H*.82,bounce=Math.abs(Math.sin(t*2))*22;
const hipY=groundY-150-bounce,hipX=W/2+Math.sin(t)*34;
g2.fillStyle='rgba(0,0,0,.5)';g2.beginPath();g2.ellipse(hipX,groundY+8,70-bounce*.8,14,0,0,7);g2.fill();
g2.strokeStyle='#fff';g2.lineWidth=9;g2.lineCap='round';g2.lineJoin='round';
const lp=Math.sin(t*4),rp=Math.sin(t*4+Math.PI);
limb(hipX,hipY,Math.PI/2-lp*.5,62,lp*.9+.2,62);
limb(hipX,hipY,Math.PI/2-rp*.5,62,rp*.9+.2,62);

  function matchPreset(idea){
    if(/stick\s*-?\s*man|stickman|stick\s*figure/i.test(idea))return STICKMAN;
    return null;
  }

  /* ---- gallery ---- */
  let anims=jget('vx_anims',[]); // [{id,title,code,ts}]
  let current=null;
  function saveAnims(){jset('vx_anims',anims.slice(0,20));}
  function renderGallery(){
    const gl=$('galList');gl.innerHTML='';
    if(!anims.length){
      const d=document.createElement('div');d.className='gal-empty';
      d.textContent='Abhi khaali hai — pehla idea likho aur Generate dabao!';
      gl.appendChild(d);return;
    }
    anims.forEach(a=>{
      const it=document.createElement('div');
      it.className='gal-item'+(current&&current.id===a.id?' active':'');
      it.innerHTML='<span>🎬</span><span class="gt"></span><button class="gx" title="Delete">🗑</button>';
      it.querySelector('.gt').textContent=a.title;
      it.onclick=e=>{
        if(e.target.closest('.gx')){
          anims=anims.filter(x=>x.id!==a.id);saveAnims();
          if(current&&current.id===a.id){current=null;$('player').srcdoc='';$('emptyStage').style.display='flex';$('stageTitle').textContent='No animation yet';}
          renderGallery();return;
        }
        loadAnim(a);
      };
      gl.appendChild(it);
    });
  }
  function loadAnim(a){
    current=a;
    $('emptyStage').style.display='none';
    $('player').srcdoc=a.code;
    $('stageTitle').textContent=a.title;
    renderGallery();
  }

  /* ---- generate ---- */
  let busy=false;
  async function generate(raw){
    const idea=(raw??$('idea').value).trim();
    if(!idea||busy)return;
    if(!canUse()){toast('🚫 Daily limit khatam — kal aana ya upgrade lena!');return;}
    busy=true;$('gen').disabled=true;$('idea').value='';
    $('emptyStage').style.display='none';
    $('loadingStage').classList.add('show');
    $('stageTitle').textContent='Generating: '+idea;
    let code=null,err='';
    const preset=matchPreset(idea);
    if(preset){
      await new Promise(r=>setTimeout(r,900));
      code=preset;
    }else{
      try{code=extractCode(await askProxy(idea));}
      catch(e){err=e.message;}
      if(!code){
        try{code=extractCode(await askFallback(idea));}
        catch(e){err=e.message;}
      }
    }
    $('loadingStage').classList.remove('show');
    if(code){
      const a={id:'a'+Date.now().toString(36),title:idea.length>40?idea.slice(0,40)+'…':idea,code,ts:Date.now()};
      anims.unshift(a);saveAnims();
      loadAnim(a);
      bumpUsage();
      toast('✨ Animation ready!');
    }else{
      $('stageTitle').textContent='Failed — try again';
      $('emptyStage').style.display='flex';
      toast('⚠️ Ban nahi payi ('+err+') — dobara try karo');
    }
    busy=false;$('gen').disabled=false;$('idea').focus();
  }
  $('gen').onclick=()=>generate();
  $('idea').addEventListener('keydown',e=>{if(e.key==='Enter')generate();});
  $('chips').addEventListener('click',e=>{
    if(e.target.classList.contains('chip'))generate(e.target.textContent);
  });

  /* ---- player actions ---- */
  $('btnReplay').onclick=()=>{if(current)$('player').srcdoc=current.code;};
  $('btnFull').onclick=()=>{
    if(!current)return;
    $('fsTitle').textContent=current.title;
    $('fsFrame').srcdoc=current.code;
    $('fsVeil').classList.add('show');
  };
  $('fsClose').onclick=()=>{$('fsVeil').classList.remove('show');$('fsFrame').srcdoc='';};
  $('fsVeil').addEventListener('click',e=>{if(e.target===$('fsVeil'))$('fsClose').click();});
  $('btnDl').onclick=()=>{
    if(!current)return;
    const b=new Blob([current.code],{type:'text/html'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(b);
    a.download='velox-animation-'+current.id+'.html';
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),5000);
    toast('⬇ Downloaded — double-click file to play');
  };
  $('btnCopy').onclick=()=>{
    if(!current)return;
    copyText(current.code).then(()=>toast('⧉ Code copied!'));
  };

  /* init */
  renderGallery();
  if(anims.length)loadAnim(anims[0]);
  $('idea').focus();
</script>
