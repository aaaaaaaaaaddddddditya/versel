<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Velox logo — recreated from brand image -->
  <rect width="512" height="512" rx="104" fill="#ccdae3"/>
  <!-- VEL -->
  <text x="278" y="308" text-anchor="end" font-family="Inter, Arial, sans-serif" font-weight="800" font-style="italic" font-size="124" letter-spacing="-4" fill="#1b2a4a">VEL</text>
  <!-- X -->
  <text x="368" y="308" text-anchor="start" font-family="Inter, Arial, sans-serif" font-weight="800" font-style="italic" font-size="124" letter-spacing="-4" fill="#1b2a4a">X</text>
  <!-- O ring -->
  <circle cx="322" cy="264" r="50" fill="none" stroke="#1cb9d8" stroke-width="21"/>
  <!-- rocket through the O -->
  <g transform="rotate(38 322 264)">
    <path d="M322 178 C338 202 338 288 322 312 C306 288 306 202 322 178 Z" fill="#22304f"/>
    <circle cx="322" cy="242" r="10" fill="#ccdae3"/>
    <path d="M310 296 L296 322 L314 312 Z" fill="#22304f"/>
    <path d="M334 296 L348 322 L330 312 Z" fill="#22304f"/>
    <path d="M322 312 L322 336" stroke="#1cb9d8" stroke-width="8" stroke-linecap="round"/>
  </g>
  <!-- small jet dash on the left -->
  <path d="M148 356 L196 344 L188 360 Z" fill="#22304f"/>
  <line x1="64" y1="358" x2="146" y2="358" stroke="#22304f" stroke-width="5" stroke-linecap="round"/>
  <!-- LITE -->
  <text x="330" y="384" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="42" letter-spacing="10" fill="#22304f">LITE</text>
  <line x1="416" y1="372" x2="470" y2="372" stroke="#22304f" stroke-width="5" stroke-linecap="round"/>
</svg>
